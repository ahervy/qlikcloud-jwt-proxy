<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Qlik Cloud JWT Proxy</title>

  <link rel="stylesheet" href="/resources/autogenerated/qlik-styles.css" />
  <script src="/resources/assets/external/requirejs/require.js"></script>
  <script src="/app-config.js"></script>
  <script>
    const qlikEmbedScript = document.createElement("script");
    qlikEmbedScript.crossOrigin = "anonymous";
    qlikEmbedScript.type = "application/javascript";
    qlikEmbedScript.src = "https://cdn.jsdelivr.net/npm/@qlik/embed-web-components";
    qlikEmbedScript.dataset.host = window.location.origin;
    document.head.appendChild(qlikEmbedScript);
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    main {
      display: grid;
      gap: 24px;
      padding: 24px;
    }

    section {
      min-height: 640px;
      position: relative;
      background: #fff;
      border: 1px solid #ddd;
    }

    .viz {
      position: relative;
      width: min(600px, calc(100vw - 48px));
      height: 600px;
      padding: 16px;
      border: 1px solid #bbb;
      border-radius: 3px;
      background: #fff;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>

  <script defer>
    const appSettings = window.__APP_CONFIG__;
    const config = {
      host: window.location.hostname,
      port: Number(window.location.port || (window.location.protocol === "https:" ? 443 : 80)),
      prefix: "/",
      isSecure: window.location.protocol === "https:",
    };

    require.config({
      baseUrl: `${window.location.origin}/resources`,
    });

    document.addEventListener("DOMContentLoaded", async () => {
      const sessionResponse = await fetch("/session", { credentials: "include" });
      const session = await sessionResponse.json();

      if (!session.authenticated) {
        window.location = "/login";
        return;
      }

      // Configure qlik-embed object from app config
      const qlikEmbedElement = document.querySelector("#qlik-embed-object");
      if (qlikEmbedElement && appSettings.qlikEmbedAppId && appSettings.qlikEmbedObjectId) {
        qlikEmbedElement.setAttribute("app-id", appSettings.qlikEmbedAppId);
        qlikEmbedElement.setAttribute("object-id", appSettings.qlikEmbedObjectId);
      }

      renderIframe();
      openWebSocket();
    });

    async function openWebSocket() {
      const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
      const backendWebSocket = new WebSocket(`${wsProtocol}://${window.location.host}/app/${appSettings.appId}?proxy=true`);
      backendWebSocket.addEventListener("open", () => renderSheet());
    }

    function createGrid(querySelector, columns, rows) {
      const gridContainer = document.querySelector(querySelector);
      gridContainer.innerHTML = "";
      gridContainer.style.display = "grid";
      gridContainer.style.gridTemplateRows = `repeat(${rows}, minmax(0, 1fr))`;
      gridContainer.style.gridTemplateColumns = `repeat(${columns}, minmax(0, 1fr))`;

      return gridContainer;
    }

    function constructSheet(sheetLayout, querySelector, addClass) {
      const gridContainer = createGrid(querySelector, sheetLayout.columns, sheetLayout.rows);
      sheetLayout.cells.forEach((object) => {
        const objectDiv = document.createElement("div");
        objectDiv.id = object.name;
        objectDiv.style.gridColumn = `${object.col + 1} / span ${object.colspan}`;
        objectDiv.style.gridRow = `${object.row + 1} / span ${object.rowspan}`;
        objectDiv.style.border = "2px solid transparent";
        objectDiv.style.margin = "5px";
        objectDiv.classList.add(addClass);
        gridContainer.appendChild(objectDiv);
      });
    }

    function renderSheet() {
      requirejs(["js/qlik"], (qlik) => {
        qlik.theme.apply(appSettings.theme);
        const app = qlik.openApp(appSettings.appId, config);
        app.getObject(appSettings.sheetId).then((sheetObject) => {
          sheetObject.getLayout().then((sheetLayout) => {
            constructSheet(sheetLayout, "#sheet", "qlikObject");
            document.querySelectorAll(".qlikObject").forEach((element) => {
              app.getObject(element, element.id);
            });
          });
        });
      });
    }

    function renderIframe() {
      const iframe = document.createElement("iframe");
      iframe.src = `/single/?appid=${appSettings.iframeAppId}&sheet=${appSettings.iframeSheetId}&theme=${appSettings.theme}&opt=ctxmenu,currsel`;
      document.querySelector("#iframe").replaceChildren(iframe);
    }

  </script>
</head>

<body>
  <main>
    <section id="sheet"></section>
    <section id="iframe"></section>
    <div class="viz">
      <qlik-embed id="qlik-embed-object" ui="object"></qlik-embed>
    </div>
  </main>
</body>

</html>
